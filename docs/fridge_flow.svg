<?xml version="1.0" encoding="UTF-8"?>
<svg width="700" height="760" viewBox="0 0 700 760" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="760" fill="#F8FAF9"/>

  <!-- Title -->
  <text x="350" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1A1A1A">냉장고 레시피 앱 — 서비스 흐름도</text>
  <text x="350" y="52" text-anchor="middle" font-size="11" fill="#888888">fridge-recipe v1.0</text>
  <line x1="40" y1="62" x2="660" y2="62" stroke="#1D9E75" stroke-width="1.5"/>

  <!-- ── STEP 1: 식재료 입력 ── -->
  <rect x="250" y="90" width="200" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.2"/>
  <text x="350" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#085041">식재료 입력</text>
  <text x="350" y="132" text-anchor="middle" font-size="10" fill="#0F6E56">냉장고 재료 등록 / 관리</text>

  <line x1="350" y1="146" x2="350" y2="178" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── STEP 2: 재료 매칭 분석 ── -->
  <rect x="230" y="178" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.2"/>
  <text x="350" y="202" text-anchor="middle" font-size="13" font-weight="700" fill="#085041">재료 매칭 분석</text>
  <text x="350" y="220" text-anchor="middle" font-size="10" fill="#0F6E56">보유 재료 ↔ 레시피 DB 비교</text>

  <line x1="350" y1="234" x2="350" y2="266" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── STEP 3: 레시피 추천 목록 ── -->
  <rect x="230" y="266" width="240" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
  <text x="350" y="290" text-anchor="middle" font-size="13" font-weight="700" fill="#0C447C">레시피 추천 목록</text>
  <text x="350" y="308" text-anchor="middle" font-size="10" fill="#185FA5">만들 수 있는 요리 우선 정렬</text>

  <line x1="350" y1="322" x2="350" y2="354" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── STEP 4: 레시피 상세 선택 ── -->
  <rect x="230" y="354" width="240" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
  <text x="350" y="378" text-anchor="middle" font-size="13" font-weight="700" fill="#0C447C">레시피 상세 선택</text>
  <text x="350" y="396" text-anchor="middle" font-size="10" fill="#185FA5">예: 계란말이 선택</text>

  <line x1="350" y1="410" x2="350" y2="442" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── STEP 5: 부족 재료 판별 ── -->
  <rect x="230" y="442" width="240" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.2"/>
  <text x="350" y="469" text-anchor="middle" font-size="13" font-weight="700" fill="#633806">부족 재료 판별</text>

  <!-- 있음 분기 (왼쪽) -->
  <line x1="230" y1="464" x2="140" y2="464" stroke="#E24B4A" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="184" y="457" text-anchor="middle" font-size="9" fill="#A32D2D">있음</text>
  <rect x="40" y="442" width="100" height="44" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1.2"/>
  <text x="90" y="461" text-anchor="middle" font-size="11" font-weight="700" fill="#791F1F">부족 재료</text>
  <text x="90" y="477" text-anchor="middle" font-size="9" fill="#A32D2D">소금, 후추 필요</text>

  <!-- 없음 분기 (오른쪽) -->
  <line x1="470" y1="464" x2="555" y2="464" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="513" y="457" text-anchor="middle" font-size="9" fill="#0F6E56">없음</text>
  <rect x="555" y="442" width="100" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.2"/>
  <text x="605" y="461" text-anchor="middle" font-size="11" font-weight="700" fill="#085041">모두 보유</text>
  <text x="605" y="477" text-anchor="middle" font-size="9" fill="#0F6E56">바로 만들기</text>

  <!-- 두 경로 → 조리 순서 합류 -->
  <path d="M90 486 L90 580 L270 580" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <path d="M605 486 L605 580 L430 580" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="350" y1="486" x2="350" y2="556" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── STEP 6: 조리 순서 표시 ── -->
  <rect x="230" y="556" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.2"/>
  <text x="350" y="580" text-anchor="middle" font-size="13" font-weight="700" fill="#085041">조리 순서 표시</text>
  <text x="350" y="598" text-anchor="middle" font-size="10" fill="#0F6E56">단계별 스텝 + 타이머</text>

  <line x1="350" y1="612" x2="350" y2="644" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── STEP 7: 요리 완료 ── -->
  <rect x="250" y="644" width="200" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.2"/>
  <text x="350" y="668" text-anchor="middle" font-size="13" font-weight="700" fill="#27500A">요리 완료</text>
  <text x="350" y="686" text-anchor="middle" font-size="10" fill="#3B6D11">리뷰 / 즐겨찾기 저장</text>

  <!-- Footer -->
  <line x1="40" y1="722" x2="660" y2="722" stroke="#DDDDDD" stroke-width="0.8"/>
  <text x="350" y="740" text-anchor="middle" font-size="10" fill="#AAAAAA">fridge-recipe — service flow v1.0</text>

</svg>
